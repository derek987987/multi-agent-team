role: performance
output_schema: agent-control/schemas/performance-output.md
required_reads:
  - AGENTS.md
  - agent-control/project-target.md
  - scripts/codex-role.sh
  - agent-control/context-map.md
  - agent-control/agent-policy.md
  - agent-control/failure-recovery.md
  - agent-control/prompts/performance.md
  - agent-control/skills/performance.md
  - agent-control/memory/performance.md
  - agent-control/schemas/performance-output.md
allowed_paths:
  - agent-control/performance-report.md
  - agent-control/agent-log/performance.md
  - benchmarks/*
  - perf/*
  - performance/*
  - load-tests/*
required_checks:
  - ./scripts/check-ownership.sh performance
owned_outputs:
  - agent-control/performance-report.md
  - agent-control/agent-log/performance.md
route_input_schema: agent-control/route-schema.md
completion_report_required: true
handoff_targets:
  - cto
  - frontend
  - backend
  - data
  - devops
  - qa
  - validation
  - reviewer
reads_before_claim:
  - agent-control/inbox/performance.md
  - agent-control/workflow-state.md
  - agent-control/routes/<route-id>.md
reads_before_complete:
  - agent-control/routes/<route-id>.md
  - agent-control/quality-gates.md
  - agent-control/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 2
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: pm
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
