role: backend
output_schema: .agents/schemas/implementation-output.md
required_reads:
  - AGENTS.md
  - .agents/project-target.md
  - scripts/codex-role.sh
  - .agents/prompts/backend.md
  - .agents/skills/backend.md
  - .agents/memory/backend.md
  - .agents/schemas/implementation-output.md
allowed_paths:
  - src/backend/*
  - src/server/*
  - server/*
  - api/*
  - db/*
  - migrations/*
  - .agents/agent-log/backend.md
required_checks:
  - ./scripts/check-ownership.sh backend
owned_outputs:
  - .agents/agent-log/backend.md
route_input_schema: .agents/route-schema.md
completion_report_required: true
handoff_targets:
  - cto
  - frontend
  - data
  - devops
  - qa
  - performance
  - reviewer
  - security
  - docs
  - integration
reads_before_claim:
  - .agents/inbox/backend.md
  - .agents/workflow-state.md
  - .agents/routes/<route-id>.md
reads_before_complete:
  - .agents/routes/<route-id>.md
  - .agents/quality-gates.md
  - .agents/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 1
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: pm
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
