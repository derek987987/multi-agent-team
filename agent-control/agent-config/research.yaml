role: research
output_schema: agent-control/schemas/research-output.md
required_reads:
  - AGENTS.md
  - agent-control/project-target.md
  - scripts/codex-role.sh
  - agent-control/context-map.md
  - agent-control/agent-policy.md
  - agent-control/adaptation-guide.md
  - agent-control/prompts/research.md
  - agent-control/skills/research.md
  - agent-control/memory/research.md
  - agent-control/schemas/research-output.md
allowed_paths:
  - agent-control/research-notes.md
  - agent-control/agent-log/research.md
required_checks:
  - ./scripts/validate-agent-workflow.sh
owned_outputs:
  - agent-control/research-notes.md
  - agent-control/agent-log/research.md
route_input_schema: agent-control/route-schema.md
completion_report_required: true
handoff_targets:
  - orchestrator
  - product
  - cto
  - design
  - frontend
  - backend
  - data
  - devops
  - security
  - performance
reads_before_claim:
  - agent-control/inbox/research.md
  - agent-control/workflow-state.md
  - agent-control/routes/<route-id>.md
reads_before_complete:
  - agent-control/routes/<route-id>.md
  - agent-control/quality-gates.md
  - agent-control/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 2
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: orchestrator
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
