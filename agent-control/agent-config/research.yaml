role: research
output_schema: .agents/schemas/research-output.md
required_reads:
  - AGENTS.md
  - .agents/project-target.md
  - scripts/codex-role.sh
  - .agents/context-map.md
  - .agents/agent-policy.md
  - .agents/adaptation-guide.md
  - .agents/prompts/research.md
  - .agents/skills/research.md
  - .agents/memory/research.md
  - .agents/schemas/research-output.md
allowed_paths:
  - .agents/research-notes.md
  - .agents/agent-log/research.md
required_checks:
  - ./scripts/validate-agent-workflow.sh
owned_outputs:
  - .agents/research-notes.md
  - .agents/agent-log/research.md
route_input_schema: .agents/route-schema.md
completion_report_required: true
handoff_targets:
  - orchestrator
  - product
  - cto
  - design
  - frontend
  - backend
  - data
  - devops
  - security
  - performance
reads_before_claim:
  - .agents/inbox/research.md
  - .agents/workflow-state.md
  - .agents/routes/<route-id>.md
reads_before_complete:
  - .agents/routes/<route-id>.md
  - .agents/quality-gates.md
  - .agents/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 2
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: orchestrator
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
