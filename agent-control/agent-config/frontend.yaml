role: frontend
output_schema: agent-control/schemas/implementation-output.md
required_reads:
  - AGENTS.md
  - agent-control/project-target.md
  - scripts/codex-role.sh
  - agent-control/prompts/frontend.md
  - agent-control/skills/frontend.md
  - agent-control/memory/frontend.md
  - agent-control/schemas/implementation-output.md
allowed_paths:
  - src/frontend/*
  - frontend/*
  - app/*
  - components/*
  - pages/*
  - agent-control/agent-log/frontend.md
required_checks:
  - ./scripts/check-ownership.sh frontend
owned_outputs:
  - agent-control/agent-log/frontend.md
route_input_schema: agent-control/route-schema.md
completion_report_required: true
handoff_targets:
  - cto
  - design
  - backend
  - data
  - qa
  - performance
  - reviewer
  - security
  - docs
  - integration
reads_before_claim:
  - agent-control/inbox/frontend.md
  - agent-control/workflow-state.md
  - agent-control/routes/<route-id>.md
reads_before_complete:
  - agent-control/routes/<route-id>.md
  - agent-control/quality-gates.md
  - agent-control/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 1
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: pm
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
