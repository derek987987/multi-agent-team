role: docs
output_schema: agent-control/schemas/docs-output.md
required_reads:
  - AGENTS.md
  - agent-control/project-target.md
  - scripts/codex-role.sh
  - agent-control/prompts/docs.md
  - agent-control/skills/docs.md
  - agent-control/memory/docs.md
  - agent-control/schemas/docs-output.md
allowed_paths:
  - agent-control/release-notes.md
  - agent-control/agent-log/docs.md
  - README.md
  - docs/*
  - CHANGELOG.md
  - RUNBOOK.md
required_checks:
  - ./scripts/check-ownership.sh docs
owned_outputs:
  - agent-control/release-notes.md
  - agent-control/agent-log/docs.md
route_input_schema: agent-control/route-schema.md
completion_report_required: true
handoff_targets:
  - product
  - cto
  - frontend
  - backend
  - devops
  - qa
  - validation
  - integration
reads_before_claim:
  - agent-control/inbox/docs.md
  - agent-control/workflow-state.md
  - agent-control/routes/<route-id>.md
reads_before_complete:
  - agent-control/routes/<route-id>.md
  - agent-control/quality-gates.md
  - agent-control/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 2
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: pm
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
