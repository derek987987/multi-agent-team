role: pm
output_schema: agent-control/schemas/pm-output.md
required_reads:
  - AGENTS.md
  - agent-control/project-target.md
  - scripts/codex-role.sh
  - agent-control/prompts/pm.md
  - agent-control/skills/pm.md
  - agent-control/memory/pm.md
  - agent-control/schemas/pm-output.md
allowed_paths:
  - agent-control/task-board.md
  - agent-control/final-acceptance.md
  - agent-control/agent-log/pm.md
required_checks:
  - ./scripts/check-ready.sh
owned_outputs:
  - agent-control/task-board.md
  - agent-control/final-acceptance.md
  - agent-control/agent-log/pm.md
route_input_schema: agent-control/route-schema.md
completion_report_required: true
handoff_targets:
  - orchestrator
  - product
  - cto
  - design
  - frontend
  - backend
  - data
  - devops
  - qa
  - performance
  - validation
  - reviewer
  - security
  - docs
  - integration
reads_before_claim:
  - agent-control/inbox/pm.md
  - agent-control/workflow-state.md
  - agent-control/routes/<route-id>.md
reads_before_complete:
  - agent-control/routes/<route-id>.md
  - agent-control/quality-gates.md
  - agent-control/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 3
dispatch_timeout_seconds: 30
stale_after: 12h
escalation_owner: orchestrator
can_create_routes: true
can_update_workflow_state: true
can_modify_task_board: true
