role: reviewer
output_schema: .agents/schemas/reviewer-output.md
required_reads:
  - AGENTS.md
  - .agents/project-target.md
  - scripts/codex-role.sh
  - .agents/prompts/reviewer.md
  - .agents/skills/reviewer.md
  - .agents/memory/reviewer.md
  - .agents/schemas/reviewer-output.md
allowed_paths:
  - .agents/review-report.md
  - .agents/agent-log/reviewer.md
required_checks:
  - ./scripts/check-done.sh
owned_outputs:
  - .agents/review-report.md
  - .agents/agent-log/reviewer.md
route_input_schema: .agents/route-schema.md
completion_report_required: true
handoff_targets:
  - cto
  - frontend
  - backend
  - data
  - devops
  - qa
  - performance
  - security
  - docs
  - integration
reads_before_claim:
  - .agents/inbox/reviewer.md
  - .agents/workflow-state.md
  - .agents/routes/<route-id>.md
reads_before_complete:
  - .agents/routes/<route-id>.md
  - .agents/quality-gates.md
  - .agents/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 2
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: pm
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
