role: product
output_schema: agent-control/schemas/product-output.md
required_reads:
  - AGENTS.md
  - agent-control/project-target.md
  - scripts/codex-role.sh
  - agent-control/prompts/product.md
  - agent-control/skills/product.md
  - agent-control/memory/product.md
  - agent-control/schemas/product-output.md
allowed_paths:
  - agent-control/product-requirements.md
  - agent-control/brief.md
  - agent-control/decisions.md
  - agent-control/agent-log/product.md
required_checks:
  - ./scripts/validate-agent-workflow.sh
owned_outputs:
  - agent-control/product-requirements.md
  - agent-control/brief.md
  - agent-control/decisions.md
  - agent-control/agent-log/product.md
route_input_schema: agent-control/route-schema.md
completion_report_required: true
handoff_targets:
  - orchestrator
  - research
  - cto
  - design
  - pm
  - qa
  - docs
reads_before_claim:
  - agent-control/inbox/product.md
  - agent-control/workflow-state.md
  - agent-control/routes/<route-id>.md
reads_before_complete:
  - agent-control/routes/<route-id>.md
  - agent-control/quality-gates.md
  - agent-control/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 2
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: orchestrator
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
