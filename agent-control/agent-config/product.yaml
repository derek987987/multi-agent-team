role: product
output_schema: .agents/schemas/product-output.md
required_reads:
  - AGENTS.md
  - .agents/project-target.md
  - scripts/codex-role.sh
  - .agents/prompts/product.md
  - .agents/skills/product.md
  - .agents/memory/product.md
  - .agents/schemas/product-output.md
allowed_paths:
  - .agents/product-requirements.md
  - .agents/brief.md
  - .agents/decisions.md
  - .agents/agent-log/product.md
required_checks:
  - ./scripts/validate-agent-workflow.sh
owned_outputs:
  - .agents/product-requirements.md
  - .agents/brief.md
  - .agents/decisions.md
  - .agents/agent-log/product.md
route_input_schema: .agents/route-schema.md
completion_report_required: true
handoff_targets:
  - orchestrator
  - research
  - cto
  - design
  - pm
  - qa
  - docs
reads_before_claim:
  - .agents/inbox/product.md
  - .agents/workflow-state.md
  - .agents/routes/<route-id>.md
reads_before_complete:
  - .agents/routes/<route-id>.md
  - .agents/quality-gates.md
  - .agents/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 2
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: orchestrator
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
