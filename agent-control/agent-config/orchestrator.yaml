role: orchestrator
output_schema: agent-control/schemas/orchestrator-output.md
required_reads:
  - AGENTS.md
  - agent-control/project-target.md
  - scripts/codex-role.sh
  - scripts/watch-routes.sh
  - scripts/dispatch-routes.sh
  - scripts/route-agent.sh
  - agent-control/prompts/orchestrator.md
  - agent-control/skills/orchestrator.md
  - agent-control/memory/orchestrator.md
  - agent-control/schemas/orchestrator-output.md
allowed_paths:
  - agent-control/intake-notes.md
  - agent-control/project-target.md
  - agent-control/brief.md
  - agent-control/workflow-state.md
  - agent-control/handoffs.md
  - agent-control/change-request.md
  - agent-control/inbox/*
  - agent-control/agent-log/orchestrator.md
required_checks:
  - ./scripts/validate-agent-workflow.sh
owned_outputs:
  - agent-control/intake-notes.md
  - agent-control/brief.md
  - agent-control/workflow-state.md
  - agent-control/handoffs.md
  - agent-control/agent-log/orchestrator.md
route_input_schema: agent-control/route-schema.md
completion_report_required: true
handoff_targets:
  - product
  - research
  - cto
  - design
  - pm
  - frontend
  - backend
  - data
  - devops
  - qa
  - performance
  - validation
  - reviewer
  - security
  - docs
  - integration
reads_before_claim:
  - agent-control/inbox/orchestrator.md
  - agent-control/workflow-state.md
  - agent-control/routes/<route-id>.md
reads_before_complete:
  - agent-control/routes/<route-id>.md
  - agent-control/quality-gates.md
  - agent-control/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 4
dispatch_timeout_seconds: 30
stale_after: 12h
escalation_owner: pm
can_create_routes: true
can_update_workflow_state: true
can_modify_task_board: false
