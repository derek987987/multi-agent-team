role: qa
output_schema: agent-control/schemas/qa-output.md
required_reads:
  - AGENTS.md
  - agent-control/project-target.md
  - scripts/codex-role.sh
  - agent-control/prompts/qa.md
  - agent-control/skills/qa.md
  - agent-control/memory/qa.md
  - agent-control/schemas/qa-output.md
allowed_paths:
  - agent-control/qa-plan.md
  - agent-control/agent-log/qa.md
  - tests/*
  - e2e/*
  - specs/*
  - fixtures/*
  - playwright.config.*
required_checks:
  - ./scripts/check-ownership.sh qa
  - ./scripts/check-done.sh
owned_outputs:
  - agent-control/qa-plan.md
  - agent-control/agent-log/qa.md
route_input_schema: agent-control/route-schema.md
completion_report_required: true
handoff_targets:
  - pm
  - frontend
  - backend
  - data
  - devops
  - performance
  - validation
  - reviewer
  - docs
reads_before_claim:
  - agent-control/inbox/qa.md
  - agent-control/workflow-state.md
  - agent-control/routes/<route-id>.md
reads_before_complete:
  - agent-control/routes/<route-id>.md
  - agent-control/quality-gates.md
  - agent-control/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 2
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: pm
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
