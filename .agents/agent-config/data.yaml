role: data
output_schema: .agents/schemas/data-output.md
required_reads:
  - AGENTS.md
  - .agents/project-target.md
  - scripts/codex-role.sh
  - .agents/prompts/data.md
  - .agents/skills/data.md
  - .agents/memory/data.md
  - .agents/schemas/data-output.md
allowed_paths:
  - .agents/agent-log/data.md
  - db/*
  - migrations/*
  - schema/*
  - prisma/*
  - supabase/*
  - data/*
  - analytics/*
required_checks:
  - ./scripts/check-ownership.sh data
owned_outputs:
  - .agents/agent-log/data.md
route_input_schema: .agents/route-schema.md
completion_report_required: true
handoff_targets:
  - cto
  - backend
  - frontend
  - devops
  - qa
  - performance
  - security
  - docs
reads_before_claim:
  - .agents/inbox/data.md
  - .agents/workflow-state.md
  - .agents/routes/<route-id>.md
reads_before_complete:
  - .agents/routes/<route-id>.md
  - .agents/quality-gates.md
  - .agents/definition-of-done.md
live_state_fields:
  - session
  - window
  - status
  - last_seen_at
  - active_route
  - workdir
  - target_project
  - branch_or_worktree
  - blocked_reason
max_parallel_routes: 1
dispatch_timeout_seconds: 30
stale_after: 24h
escalation_owner: pm
can_create_routes: false
can_update_workflow_state: false
can_modify_task_board: false
