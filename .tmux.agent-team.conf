# Project-local tmux config for the multi-agent coding workflow.
# Use with: tmux -f .tmux.agent-team.conf new -s agent-team

set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 50000
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind r source-file .tmux.agent-team.conf \; display-message "agent-team tmux config reloaded"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g status on
set -g status-interval 5
set -g status-left "#[bold] #S "
set -g status-right "%Y-%m-%d %H:%M "
setw -g window-status-current-format "#[bold,reverse] #I:#W "
setw -g window-status-format " #I:#W "

setw -g automatic-rename off
set -g allow-rename off

setw -g mode-keys vi
bind-key [ copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

